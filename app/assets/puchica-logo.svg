    <path d="M139 174C139 227 169 255 207 255C245 255 275 227 275 174"
      stroke="white" stroke-width="18" stroke-linecap="round"/>
    <circle cx="139" cy="174" r="14" fill="white"/>
    <circle cx="275" cy="174" r="14" fill="white"/>
  </g>

  <text x="410" y="244"
    fill="#160F3A"
    font-family="Outfit, Poppins, Inter, Arial, sans-serif"
    font-size="150"
    font-weight="800"

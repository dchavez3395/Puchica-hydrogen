<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Puchica Logo</title>
  <desc id="desc">Puchica ecommerce logo with purple shopping bag P icon and dark indigo wordmark.</desc>

  <defs>
    <linearGradient id="puchica-violet" x1="80" y1="42" x2="258" y2="282" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8A78FA"/>
      <stop offset="0.42" stop-color="#6D4CFF"/>
      <stop offset="1" stop-color="#3A2CCF"/>
    </linearGradient>

    <linearGradient id="puchica-fold" x1="97" y1="250" x2="198" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#241B9B"/>
      <stop offset="1" stop-color="#6D4CFF"/>
    </linearGradient>

    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#160F3A" flood-opacity="0.16"/>
    </filter>
